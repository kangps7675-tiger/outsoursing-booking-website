<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhilSolution Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-green: #1A3A2A;
    --mid-green: #2D5A40;
    --light-green: #4A8C5C;
    --stone: #8C8678;
    --warm-white: #FDFAF5;
    --cream: #F5F0E8;
    --accent: #C8A96E;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--deep-green);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #loginView {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .login-card {
    background: var(--warm-white);
    border: 1px solid rgba(26,58,42,.12);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(26,58,42,.08);
  }

  .login-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--deep-green);
    text-align: center;
    margin-bottom: 6px;
  }

  .login-logo span { color: var(--light-green); }

  .login-sub {
    text-align: center;
    font-size: .85rem;
    color: var(--stone);
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: .8rem;
    font-weight: 500;
    color: var(--mid-green);
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid rgba(26,58,42,.18);
    border-radius: 8px;
    font-family: inherit;
    font-size: .9rem;
    background: var(--warm-white);
    color: var(--deep-green);
    transition: border-color .2s;
    outline: none;
  }

  .form-group input:focus {
    border-color: var(--light-green);
  }

  .login-btn {
    width: 100%;
    padding: 12px;
    background: var(--deep-green);
    color: var(--warm-white);
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: .95rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: background .2s;
  }

  .login-btn:hover { background: var(--mid-green); }
  .login-btn:disabled { opacity: .6; cursor: not-allowed; }

  .login-error {
    font-size: .82rem;
    color: #c0392b;
    background: #fdf0ee;
    border: 1px solid #f5c6c0;
    border-radius: 6px;
    padding: 8px 12px;
    margin-top: 12px;
    display: none;
  }

  /* ── DASHBOARD ── */
  #dashView { display: none; }

  .admin-nav {
    background: var(--deep-green);
    color: var(--warm-white);
    padding: 0 max(24px, (100% - 1200px)/2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .admin-nav-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .admin-nav-logo span { color: var(--accent); }

  .admin-nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .admin-email {
    font-size: .8rem;
    color: rgba(253,250,245,.6);
  }

  .logout-btn {
    padding: 6px 14px;
    border: 1px solid rgba(253,250,245,.3);
    border-radius: 6px;
    background: transparent;
    color: var(--warm-white);
    font-family: inherit;
    font-size: .8rem;
    cursor: pointer;
    transition: background .2s;
  }

  .logout-btn:hover { background: rgba(253,250,245,.1); }

  .admin-main {
    padding: 32px max(24px, (100% - 1200px)/2);
  }

  /* 요약 카드 */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .summary-card {
    background: var(--warm-white);
    border: 1px solid rgba(26,58,42,.1);
    border-radius: 12px;
    padding: 20px 24px;
    text-align: center;
  }

  .summary-label {
    font-size: .78rem;
    color: var(--stone);
    margin-bottom: 8px;
  }

  .summary-num {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--deep-green);
    line-height: 1;
  }

  .summary-card[data-status="대기중"] .summary-num { color: var(--stone); }
  .summary-card[data-status="진행중"] .summary-num { color: var(--mid-green); }
  .summary-card[data-status="완료"] .summary-num { color: var(--light-green); }
  .summary-card[data-status="취소"] .summary-num { color: #c0392b; }

  /* 테이블 */
  .table-wrap {
    background: var(--warm-white);
    border: 1px solid rgba(26,58,42,.1);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(26,58,42,.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .table-title {
    font-size: 1rem;
    font-weight: 600;
  }

  .refresh-btn {
    padding: 6px 14px;
    border: 1px solid rgba(26,58,42,.2);
    border-radius: 6px;
    background: transparent;
    color: var(--mid-green);
    font-family: inherit;
    font-size: .8rem;
    cursor: pointer;
    transition: background .2s;
  }

  .refresh-btn:hover { background: var(--cream); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .875rem;
  }

  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: .75rem;
    font-weight: 600;
    color: var(--stone);
    background: var(--cream);
    white-space: nowrap;
  }

  tbody tr {
    border-top: 1px solid rgba(26,58,42,.06);
    transition: background .15s;
  }

  tbody tr:hover { background: rgba(74,140,92,.04); }

  tbody td {
    padding: 14px 16px;
    vertical-align: middle;
    color: var(--deep-green);
  }

  .td-id { color: var(--stone); font-size: .8rem; }

  .td-date { color: var(--stone); font-size: .82rem; white-space: nowrap; }

  .td-msg {
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--stone);
    font-size: .82rem;
  }

  /* 상태 버튼 */
  .status-btn {
    padding: 5px 12px;
    border-radius: 20px;
    font-family: inherit;
    font-size: .78rem;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }

  .status-btn:hover { opacity: .8; }
  .status-btn:active { transform: scale(.96); }

  .status-btn[data-status="대기중"] {
    background: rgba(140,134,120,.1);
    border-color: var(--stone);
    color: var(--stone);
  }

  .status-btn[data-status="진행중"] {
    background: rgba(45,90,64,.1);
    border-color: var(--mid-green);
    color: var(--mid-green);
  }

  .status-btn[data-status="완료"] {
    background: rgba(74,140,92,.12);
    border-color: var(--light-green);
    color: var(--light-green);
  }

  .status-btn[data-status="취소"] {
    background: rgba(192,57,43,.08);
    border-color: #c0392b;
    color: #c0392b;
  }

  .status-btn:disabled { cursor: not-allowed; opacity: .5; }

  /* 로딩 / 빈 상태 */
  .table-empty {
    padding: 48px;
    text-align: center;
    color: var(--stone);
    font-size: .9rem;
  }

  @media (max-width: 900px) {
    .summary-cards { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 640px) {
    .admin-main { padding: 20px 16px; }
    .summary-cards { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .table-wrap { overflow-x: auto; }
    table { min-width: 640px; }
    .login-card { padding: 32px 24px; }
  }
</style>
</head>
<body>

<!-- ── 로그인 뷰 ── -->
<div id="loginView">
  <div class="login-card">
    <div class="login-logo">Phil<span>Solution</span></div>
    <div class="login-sub">어드민 로그인</div>
    <div class="form-group">
      <label for="loginEmail">이메일</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="loginPassword">비밀번호</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── 대시보드 뷰 ── -->
<div id="dashView">
  <nav class="admin-nav">
    <div class="admin-nav-logo">Phil<span>Solution</span> Admin</div>
    <div class="admin-nav-right">
      <span class="admin-email" id="adminEmail"></span>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>
  </nav>

  <main class="admin-main">
    <!-- 요약 카드 -->
    <div class="summary-cards">
      <div class="summary-card" data-status="대기중">
        <div class="summary-label">대기중</div>
        <div class="summary-num" id="cnt대기중">—</div>
      </div>
      <div class="summary-card" data-status="진행중">
        <div class="summary-label">진행중</div>
        <div class="summary-num" id="cnt진행중">—</div>
      </div>
      <div class="summary-card" data-status="완료">
        <div class="summary-label">완료</div>
        <div class="summary-num" id="cnt완료">—</div>
      </div>
      <div class="summary-card" data-status="취소">
        <div class="summary-label">취소</div>
        <div class="summary-num" id="cnt취소">—</div>
      </div>
    </div>

    <!-- 상담 목록 테이블 -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">상담 신청 목록</div>
        <button class="refresh-btn" id="refreshBtn">새로고침</button>
      </div>
      <div id="tableContainer">
        <div class="table-empty">로딩 중...</div>
      </div>
    </div>
  </main>
</div>

<script type="module">
  // =============================================
  // 설정값 — philsolution_landing_mockup.js와 동일한 값 입력
  // =============================================
  const SUPABASE_URL      = 'https://bpcdmavlywwznchxufex.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwY2RtYXZseXd3em5jaHh1ZmV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTc0MDUsImV4cCI6MjA5MTEzMzQwNX0.RJx-Xw4Mb81gdWQ2nflTUQ5uF-cmCVqafnUPpCqtY9I';

  // ─── Supabase SDK (v2 CDN) ───
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');

  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    document.getElementById('loginError').textContent = 'SUPABASE_URL과 SUPABASE_ANON_KEY를 admin.html 상단에 입력해주세요.';
    document.getElementById('loginError').style.display = 'block';
  }

  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ─── XSS 방지 ───
  const escapeHtml = (str) => {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#x27;');
  };

  const STATUS_CYCLE = ['대기중', '진행중', '완료', '취소'];

  const nextStatus = (current) => {
    const idx = STATUS_CYCLE.indexOf(current);
    return STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  };

  // ─── 뷰 전환 ───
  const showLogin = () => {
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('dashView').style.display = 'none';
  };

  const showDash = (email) => {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
    document.getElementById('adminEmail').textContent = email ?? '';
  };

  // ─── 데이터 로드 ───
  const loadData = async () => {
    document.getElementById('tableContainer').innerHTML = '<div class="table-empty">로딩 중...</div>';

    const { data, error } = await sb
      .from('consultations')
      .select('id, created_at, name, contact, email, message, status')
      .order('id', { ascending: false });

    if (error) {
      document.getElementById('tableContainer').innerHTML =
        `<div class="table-empty">데이터 조회 실패: ${escapeHtml(error.message)}</div>`;
      return;
    }

    if (!data || data.length === 0) {
      document.getElementById('tableContainer').innerHTML =
        '<div class="table-empty">상담 신청 내역이 없습니다.</div>';
      updateSummary([]);
      return;
    }

    updateSummary(data);
    renderTable(data);
  };

  const updateSummary = (data) => {
    const counts = { '대기중': 0, '진행중': 0, '완료': 0, '취소': 0 };
    data.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });
    Object.entries(counts).forEach(([status, n]) => {
      const el = document.getElementById(`cnt${status}`);
      if (el) el.textContent = n;
    });
  };

  const renderTable = (data) => {
    const rows = data.map(r => {
      const date = r.created_at ? new Date(r.created_at).toLocaleDateString('ko-KR') : '—';
      const next = nextStatus(r.status ?? '대기중');
      return `<tr>
        <td class="td-id">#${escapeHtml(String(r.id))}</td>
        <td class="td-date">${escapeHtml(date)}</td>
        <td>${escapeHtml(r.name ?? '—')}</td>
        <td>${escapeHtml(r.contact ?? '—')}</td>
        <td>${escapeHtml(r.email ?? '—')}</td>
        <td class="td-msg" title="${escapeHtml(r.message ?? '')}">${escapeHtml(r.message ?? '—')}</td>
        <td>
          <button
            class="status-btn"
            data-status="${escapeHtml(r.status ?? '대기중')}"
            data-id="${escapeHtml(String(r.id))}"
            data-next="${escapeHtml(next)}"
            title="클릭하면 '${escapeHtml(next)}'로 변경"
          >${escapeHtml(r.status ?? '대기중')}</button>
        </td>
      </tr>`;
    }).join('');

    document.getElementById('tableContainer').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>신청일</th>
            <th>이름</th>
            <th>연락처</th>
            <th>이메일</th>
            <th>문의 내용</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    // 상태 버튼 이벤트 위임
    document.getElementById('tableContainer').addEventListener('click', async (e) => {
      const btn = e.target.closest('.status-btn');
      if (!btn) return;
      const id = btn.dataset.id;
      const next = btn.dataset.next;
      btn.disabled = true;

      const { error } = await sb
        .from('consultations')
        .update({ status: next })
        .eq('id', id);

      if (error) {
        alert(`상태 변경 실패: ${error.message}`);
        btn.disabled = false;
      } else {
        await loadData();
      }
    }, { once: true });
  };

  // ─── 로그인 ───
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '로그인 중...';

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '로그인';
    }
    // 성공 시 onAuthStateChange가 처리
  });

  // Enter 키로 로그인
  document.getElementById('loginPassword').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });

  // ─── 로그아웃 ───
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
  });

  // ─── 새로고침 ───
  document.getElementById('refreshBtn').addEventListener('click', loadData);

  // ─── 인증 상태 감지 ───
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      showDash(session.user.email);
      await loadData();
    } else {
      showLogin();
    }
  });

  // ─── 초기 세션 확인 ───
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    showDash(session.user.email);
    await loadData();
  } else {
    showLogin();
  }
</script>

</body>
</html>
